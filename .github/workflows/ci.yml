name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Verify module tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod
          git ls-files --error-unmatch go.sum 2>/dev/null && git diff --exit-code -- go.sum || true

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: |
          echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build binaries
        run: |
          GOOS=linux  GOARCH=amd64 go build -o dist/deploy_site_linux_amd64  .
          GOOS=linux  GOARCH=arm64 go build -o dist/deploy_site_linux_arm64  .
          GOOS=darwin GOARCH=amd64 go build -o dist/deploy_site_darwin_amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/deploy_site_darwin_arm64 .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build and package release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # Plain binaries (used by the curl installer)
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%%/*}"
            arch="${target##*/}"
            CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" \
              go build -trimpath -ldflags="${LDFLAGS}" \
              -o "dist/deploy_site_${os}_${arch}" .
          done

          # Linux bundles: binary + packaging scripts in a tar.gz
          # (used by packaging/linux/install.sh for full system installs)
          for arch in amd64 arm64; do
            bundle="deploy_site_linux_${arch}_${VERSION}"
            mkdir -p "dist/${bundle}"
            cp "dist/deploy_site_linux_${arch}"                "dist/${bundle}/deploy_site"
            cp packaging/linux/install.sh                      "dist/${bundle}/"
            cp packaging/linux/uninstall.sh                    "dist/${bundle}/"
            cp packaging/linux/config_deploy_site.example.json "dist/${bundle}/"
            chmod +x "dist/${bundle}/deploy_site" \
                     "dist/${bundle}/install.sh" \
                     "dist/${bundle}/uninstall.sh"
            tar -C dist -czf "dist/${bundle}.tar.gz" "${bundle}"
          done

          # Checksums for all uploaded artifacts
          (cd dist && sha256sum \
            "deploy_site_linux_amd64" \
            "deploy_site_linux_arm64" \
            "deploy_site_darwin_amd64" \
            "deploy_site_darwin_arm64" \
            "deploy_site_linux_amd64_${VERSION}.tar.gz" \
            "deploy_site_linux_arm64_${VERSION}.tar.gz" \
            > sha256sums.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/deploy_site_linux_amd64
            dist/deploy_site_linux_arm64
            dist/deploy_site_darwin_amd64
            dist/deploy_site_darwin_arm64
            dist/deploy_site_linux_amd64_${{ github.ref_name }}.tar.gz
            dist/deploy_site_linux_arm64_${{ github.ref_name }}.tar.gz
            dist/sha256sums.txt
          generate_release_notes: true
